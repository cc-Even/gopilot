name: CI & Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  # --- 阶段 1: 运行测试 ---
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run Tests
        run: go test ./...

  # --- 阶段 2: 多平台编译并打包 ---
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
          - goos: windows
            goarch: amd64
            os: windows-latest
          - goos: darwin
            goarch: amd64
            os: macos-latest
          - goos: darwin
            goarch: arm64
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须拉取全部历史才能生成 Changelog

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install cross-compiler for Linux arm64
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build and Package
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          CGO_ENABLED: 1
        run: |
          # 设置跨平台 CGO 编译器 (针对 Linux arm64)
          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
          fi

          # 1. 设置二进制文件名为 gopilot
          BINARY_NAME="gopilot"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="gopilot.exe"
          fi
          
          # 2. 编译 (启用 CGO)
          go build -v -ldflags "-X main.version=$VERSION" -o "$BINARY_NAME" .
          
          # 3. 定义外部压缩包名称
          PACKAGE_NAME="gopilot-${{ matrix.goos }}-${{ matrix.goarch }}"
          
          # 4. 打包二进制文件 + 目录 + 配置文件
          if [ "${{ matrix.goos }}" = "windows" ]; then
            # Windows 下可能没有 zip 命令，如果需要可以使用 powershell 或者 7z
            # 但 GitHub Actions windows-latest 一般预装了 7z / tar
            7z a "${PACKAGE_NAME}.zip" "$BINARY_NAME" skills subagents .env.example
            echo "ASSET_PATH=${PACKAGE_NAME}.zip" >> $GITHUB_ENV
          else
            tar -czvf "${PACKAGE_NAME}.tar.gz" "$BINARY_NAME" skills subagents .env.example
            echo "ASSET_PATH=${PACKAGE_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET_PATH }}

  # --- 阶段 3: 汇总发布 (这个 Job 必须和上面的 release 对齐) ---
  publish:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./assets
          pattern: binaries-*
          merge-multiple: true

      - name: Generate Release Notes
        id: changelog
        run: |
          echo "## 🚀 Gopilot $GITHUB_REF_NAME" > release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 包含内容" >> release_notes.md
          echo "- \`gopilot\` 执行文件" >> release_notes.md
          echo "- \`skills/\` 技能文件夹" >> release_notes.md
          echo "- \`subagents/\` 子智能体文件夹" >> release_notes.md
          echo "- \`.env.example\` 配置模板" >> release_notes.md
          echo "" >> release_notes.md

          echo "### 📝 更新日志 (Changelog)" >> release_notes.md
          PREVIOUS_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --oneline --no-merges -n 20 | sed 's/^/* /' >> release_notes.md
          else
            git log --oneline --no-merges $PREVIOUS_TAG..${{ github.ref_name }} | sed 's/^/* /' >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo "### 🔒 校验和 (SHA256)" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          cd assets && sha256sum * >> ../release_notes.md
          echo "\`\`\`" >> release_notes.md

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}