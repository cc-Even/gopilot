name: CI & Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  # --- 阶段 1: 运行测试 ---
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run Tests
        run: go test ./...

  # --- 阶段 2: 多平台编译并发布 ---
  # 只有推送到 tag 且测试通过后才执行
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 关键：拉取全部历史，否则拿不到 commit log

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and Package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          # 1. 统一编译二进制名为 gopilot
          BINARY_NAME="gopilot"
          [ "${{ matrix.goos }}" = "windows" ] && BINARY_NAME="gopilot.exe"
          
          go build -v -ldflags "-X main.version=$VERSION" -o "$BINARY_NAME" .
          
          # 2. 定义打包文件名
          PACKAGE_NAME="gopilot-${{ matrix.goos }}-${{ matrix.goarch }}"
          
          # 3. 打包二进制 + 文件夹 + .env.example
          # 这里的 skills/ subagents/ .env.example 必须存在于仓库根目录
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${PACKAGE_NAME}.zip" "$BINARY_NAME" skills subagents .env.example
            echo "ASSET_PATH=${PACKAGE_NAME}.zip" >> $GITHUB_ENV
          else
            tar -czvf "${PACKAGE_NAME}.tar.gz" "$BINARY_NAME" skills subagents .env.example
            echo "ASSET_PATH=${PACKAGE_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET_PATH }}

    publish:
      needs: release
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0 # 同样需要拉取历史来对比 tag

        - name: Download all artifacts
          uses: actions/download-artifact@v4
          with:
            path: ./assets
            pattern: binaries-*
            merge-multiple: true

        - name: Generate Release Notes
          id: changelog
          run: |
            echo "## 🚀 Gopilot $GITHUB_REF_NAME" > release_notes.md
            echo "" >> release_notes.md

            echo "### 📦 包含内容" >> release_notes.md
            echo "- \`gopilot\` 执行文件" >> release_notes.md
            echo "- \`skills/\` 技能文件夹" >> release_notes.md
            echo "- \`subagents/\` 子智能体文件夹" >> release_notes.md
            echo "- \`.env.example\` 环境变量配置模板" >> release_notes.md
            echo "" >> release_notes.md

            echo "### 📝 更新日志 (Changelog)" >> release_notes.md
            # 提取两个 Tag 之间的 commit 信息
            PREVIOUS_TAG=$(git tag --sort=-v:refname | sed -n '2p')
            if [ -z "$PREVIOUS_TAG" ]; then
              # 如果是第一个版本，则取最近 20 条
              git log --oneline --no-merges -n 20 | sed 's/^/* /' >> release_notes.md
            else
              # 获取当前 tag 和上一个 tag 之间的差异
              git log --oneline --no-merges $PREVIOUS_TAG..${{ github.ref_name }} | sed 's/^/* /' >> release_notes.md
            fi

            echo "" >> release_notes.md
            echo "### 🔒 校验和 (SHA256)" >> release_notes.md
            echo "\`\`\`" >> release_notes.md
            cd assets && sha256sum * >> ../release_notes.md
            echo "\`\`\`" >> release_notes.md

        - name: Upload to Release
          uses: softprops/action-gh-release@v2
          with:
            body_path: release_notes.md
            files: assets/*
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}